<style>
  :root {
    /* Fresh modern palette */
    --bg: #faf9f7;
    --bg-soft: #f2f0ec;
    --surface: #ffffff;
    --surface-soft: #fafafa;

    --ink: #0f0f0f;
    --ink-soft: #525252;
    --ink-mute: #a1a1a1;

    --accent: #ff5a3d;       /* coral - warm, friendly */
    --accent-soft: #ffebe6;
    --accent-deep: #e64626;

    --mint: #d4f0e0;
    --mint-deep: #16a34a;
    --sky: #dbeafe;
    --sky-deep: #2563eb;
    --lemon: #fef3c7;
    --lemon-deep: #d97706;
    --lilac: #ede9fe;
    --lilac-deep: #7c3aed;
    --pink: #fce7f3;
    --pink-deep: #ec4899;

    --line: rgba(15, 15, 15, 0.06);
    --line-strong: rgba(15, 15, 15, 0.12);

    --shadow-sm: 0 1px 2px rgba(15, 15, 15, 0.04);
    --shadow: 0 2px 8px rgba(15, 15, 15, 0.06), 0 1px 2px rgba(15, 15, 15, 0.04);
    --shadow-lg: 0 12px 32px rgba(15, 15, 15, 0.10), 0 4px 8px rgba(15, 15, 15, 0.04);

    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --radius-2xl: 24px;

    --ease: cubic-bezier(0.32, 0.72, 0, 1);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    overflow: hidden;
    letter-spacing: -0.01em;
  }

  .serif { font-family: 'Instrument Serif', Georgia, serif; letter-spacing: -0.02em; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }

  #app {
    position: relative;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 520px;
    margin: 0 auto;
    background: var(--bg);
    z-index: 2;
  }

  /* ===== TRIP LIST SCREEN ===== */
  .trip-list-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    max-width: 520px;
    margin: 0 auto;
  }

  .trip-list-header {
    padding: 32px 24px 20px;
    padding-top: calc(32px + env(safe-area-inset-top));
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
  }

  .trip-list-title {
    flex: 1;
  }

  .trip-list-greeting {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-top: 4px;
    letter-spacing: -0.01em;
  }

  .trip-list-new-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 999px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(255, 90, 61, 0.3);
    transition: all 0.15s var(--ease);
    letter-spacing: -0.01em;
    flex-shrink: 0;
  }
  .trip-list-new-btn:active { transform: scale(0.95); }

  .trip-list-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .trip-list-logout-btn {
    background: var(--bg-soft);
    border: none;
    color: var(--ink-soft);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s var(--ease);
  }
  .trip-list-logout-btn:active {
    transform: scale(0.92);
    background: var(--accent-soft);
    color: var(--accent);
  }

  .trip-list-content {
    padding: 8px 20px 100px;
  }

  .trip-list-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-mute);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 4px 10px;
  }

  .trip-list-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.15s var(--ease);
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .trip-list-card:active { transform: scale(0.99); }

  .trip-list-card.upcoming::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--lemon-deep));
  }

  .trip-list-card.ongoing::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--mint-deep);
  }

  .trip-list-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 10px;
  }

  .trip-list-card-name {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 24px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1.2;
    flex: 1;
    min-width: 0;
    word-break: break-word;
  }

  .trip-list-card-status {
    font-size: 10px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 999px;
    letter-spacing: 0.05em;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .trip-list-card-status.ongoing { background: var(--mint); color: var(--mint-deep); }
  .trip-list-card-status.upcoming { background: var(--lemon); color: var(--lemon-deep); }
  .trip-list-card-status.past { background: var(--bg-soft); color: var(--ink-mute); }

  .trip-list-card-dates {
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: -0.01em;
  }

  .trip-list-card-meta {
    display: flex;
    gap: 14px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--ink-mute);
    align-items: center;
  }

  .trip-list-card-code {
    font-family: 'Geist Mono', monospace;
    font-weight: 500;
  }

  .trip-list-card-delete {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--ink-mute);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 999px;
    transition: all 0.15s;
  }
  .trip-list-card-delete:active {
    color: var(--accent);
    background: var(--accent-soft);
  }

  .trip-list-empty {
    text-align: center;
    padding: 60px 32px 40px;
  }

  .trip-list-empty-emoji {
    font-size: 56px;
    display: block;
    margin-bottom: 16px;
  }

  .trip-list-empty-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 26px;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }

  .trip-list-empty-desc {
    font-size: 14px;
    color: var(--ink-mute);
    margin-bottom: 24px;
  }

  .trip-list-empty-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  .trip-list-empty-actions .setup-btn {
    width: 100%;
    max-width: 280px;
  }

  /* ===== BACK TO LIST BTN (in app header) ===== */
  .back-to-list-btn {
    background: var(--bg-soft);
    border: none;
    color: var(--ink-soft);
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px 6px 10px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s var(--ease);
    letter-spacing: -0.01em;
  }
  .back-to-list-btn:active { transform: scale(0.96); background: var(--line-strong); }
  .back-to-list-btn span { font-size: 14px; line-height: 1; }

  /* ===== SETUP BACK BTN ===== */
  .setup-back {
    position: absolute;
    top: calc(20px + env(safe-area-inset-top));
    left: 20px;
    background: var(--bg-soft);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 20px;
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s var(--ease);
    z-index: 10;
  }
  .setup-back:active { transform: scale(0.92); }

  /* ===== SETUP SCREEN ===== */
  .setup {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px;
    text-align: center;
  }

  .setup::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -80px;
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, rgba(255, 90, 61, 0.15) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .setup::after {
    content: '';
    position: absolute;
    bottom: -100px;
    left: -80px;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(37, 99, 235, 0.12) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .setup > * { position: relative; z-index: 2; }

  .setup-logo {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 84px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.04em;
    margin-bottom: 4px;
    line-height: 1;
  }

  .setup-tagline {
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 56px;
  }

  .setup h2 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 26px;
    margin-bottom: 32px;
    color: var(--ink);
    line-height: 1.3;
  }

  .setup input {
    width: 100%;
    max-width: 340px;
    padding: 16px 20px;
    font-size: 16px;
    font-family: 'Geist', sans-serif;
    background: var(--surface);
    border: 1.5px solid var(--line-strong);
    border-radius: var(--radius);
    color: var(--ink);
    margin-bottom: 12px;
    outline: none;
    transition: all 0.2s var(--ease);
    box-shadow: var(--shadow-sm);
  }
  .setup input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .setup-btn {
    padding: 16px 40px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 999px;
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s var(--ease);
    box-shadow: var(--shadow);
  }
  .setup-btn:active {
    transform: scale(0.96);
  }

  .setup-divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 28px 0;
    color: var(--ink-mute);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .setup-divider::before, .setup-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line-strong);
    max-width: 60px;
  }

  .setup-hint {
    max-width: 340px;
    margin: 4px auto 20px;
    padding: 12px 16px;
    background: var(--lemon);
    border-radius: var(--radius);
    font-size: 12px;
    line-height: 1.55;
    color: var(--lemon-deep);
    font-weight: 500;
    text-align: center;
  }

  /* ===== HEADER ===== */
  header {
    padding: 16px 20px 14px;
    padding-top: calc(16px + env(safe-area-inset-top));
    background: var(--bg);
    position: relative;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .trip-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mute);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .trip-label-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .trip-code {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
    background: var(--surface);
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
    border: 1px solid var(--line-strong);
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .trip-code:active { transform: scale(0.96); background: var(--bg-soft); }
  .trip-code::before { content: '🔗'; font-size: 10px; }

  .trip-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 34px;
    color: var(--ink);
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 6px;
  }

  .trip-meta {
    font-size: 13px;
    color: var(--ink-soft);
    display: flex;
    gap: 10px;
    align-items: center;
    font-weight: 500;
  }

  .trip-meta .dot {
    width: 3px;
    height: 3px;
    background: var(--ink-mute);
    border-radius: 50%;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--bg);
    padding: 4px 16px 14px;
  }

  .tab {
    flex: 1;
    padding: 10px 12px;
    text-align: center;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-mute);
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.2s var(--ease);
    letter-spacing: -0.01em;
  }

  .tab.active {
    color: var(--ink);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }

  .tab-count {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    margin-left: 4px;
    color: var(--ink-mute);
    font-weight: 500;
  }
  .tab.active .tab-count { color: var(--accent); }

  /* ===== MAIN CONTENT ===== */
  main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    background: var(--bg);
  }

  .panel {
    display: none;
    min-height: 100%;
  }
  .panel.active { display: block; animation: fadeIn 0.25s var(--ease); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== ITINERARY ===== */
  .day-selector {
    display: flex;
    gap: 8px;
    padding: 4px 20px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-selector::-webkit-scrollbar { display: none; }

  .day-chip {
    flex-shrink: 0;
    min-width: 64px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    text-align: center;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    box-shadow: var(--shadow-sm);
  }

  .day-chip:active { transform: scale(0.95); }

  .day-chip.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
    box-shadow: var(--shadow);
  }

  .day-chip .day-num {
    font-family: 'Geist', sans-serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .day-chip .day-date {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mute);
    margin-top: 3px;
  }
  .day-chip.active .day-date { color: rgba(255,255,255,0.7); }

  .day-chip-add {
    background: transparent;
    border: 1.5px dashed var(--line-strong);
    color: var(--ink-mute);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 300;
    box-shadow: none;
  }

  .timeline {
    padding: 8px 20px 100px;
  }

  .place-card {
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    position: relative;
    animation: slideIn 0.3s var(--ease);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .place-marker-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }

  .place-marker {
    width: 36px;
    height: 36px;
    background: var(--surface);
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Geist', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    box-shadow: var(--shadow-sm);
  }

  .place-line {
    flex: 1;
    width: 2px;
    background: linear-gradient(to bottom, var(--line-strong), transparent);
    margin-top: 4px;
    min-height: 12px;
  }

  .place-content {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 16px 18px;
    border-radius: var(--radius-lg);
    min-width: 0;
    box-shadow: var(--shadow-sm);
    transition: all 0.15s var(--ease);
  }

  .place-content:active { transform: scale(0.99); }

  .place-time {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 8px;
    border-radius: 6px;
    margin-bottom: 8px;
    letter-spacing: 0;
  }

  .place-name {
    font-family: 'Geist', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
    word-break: break-word;
  }

  .place-addr {
    font-size: 13px;
    color: var(--ink-mute);
    line-height: 1.45;
    word-break: break-word;
  }

  .place-note {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 6px;
    padding: 8px 12px;
    background: var(--lemon);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--lemon-deep);
  }

  .place-actions {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }

  .place-btn {
    font-size: 12px;
    font-family: 'Geist', sans-serif;
    font-weight: 600;
    background: var(--bg-soft);
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    padding: 7px 12px;
    border-radius: 999px;
    transition: all 0.15s var(--ease);
    letter-spacing: -0.01em;
  }
  .place-btn:active { transform: scale(0.95); }
  .place-btn.danger { color: var(--accent); background: var(--accent-soft); }
  .place-btn.expense { color: var(--mint-deep); background: var(--mint); }
  .place-btn.expense::before { content: '+ '; }

  .place-expenses {
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--mint);
    border-radius: var(--radius);
  }

  .place-expense-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 10px;
    align-items: center;
    font-size: 13px;
    padding: 4px 0;
  }

  .pe-payer {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    background: white;
    border-radius: 999px;
    color: var(--ink-soft);
  }

  .pe-title {
    font-family: 'Geist', sans-serif;
    font-weight: 500;
    color: var(--ink);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }

  .pe-split {
    font-size: 10px;
    font-weight: 600;
    color: var(--mint-deep);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .pe-amount {
    font-family: 'Geist', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .place-expense-total {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(22, 163, 74, 0.2);
    text-align: right;
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    color: var(--mint-deep);
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .add-place-btn {
    width: 100%;
    padding: 18px;
    border: 1.5px dashed var(--line-strong);
    background: transparent;
    font-family: 'Geist', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: var(--ink-mute);
    cursor: pointer;
    border-radius: var(--radius);
    margin-top: 4px;
    transition: all 0.15s var(--ease);
  }
  .add-place-btn:active { transform: scale(0.99); background: var(--bg-soft); }

  .empty-state {
    padding: 80px 32px 24px;
    text-align: center;
  }
  .empty-state-emoji {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  .empty-state .serif-big {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 26px;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .empty-state div:last-child {
    font-size: 14px;
    color: var(--ink-mute);
  }

  /* ===== MAP ===== */
  #map {
    width: 100%;
    height: 100%;
    background: var(--bg-soft);
  }

  .map-container {
    position: relative;
    height: 100%;
    min-height: calc(100dvh - 180px);
  }

  .map-legend {
    position: absolute;
    top: 14px;
    left: 14px;
    right: 14px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 12px 16px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    z-index: 500;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow);
  }

  .map-legend .mono {
    font-weight: 600;
    color: var(--accent);
  }

  .leaflet-container { font-family: 'Geist', sans-serif; }

  /* ===== EXPENSES ===== */
  .expense-summary {
    padding: 4px 20px 20px;
  }

  .total-card {
    background: linear-gradient(135deg, var(--ink) 0%, #2a2a2a 100%);
    color: white;
    padding: 20px 22px;
    border-radius: var(--radius-xl);
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }

  .total-card::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 160px;
    height: 160px;
    background: radial-gradient(circle, rgba(255, 90, 61, 0.3) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .total-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 600;
    margin-bottom: 6px;
    position: relative;
  }

  .total-amount {
    font-family: 'Geist', sans-serif;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    position: relative;
  }

  #memberDetails {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }

  .member-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
  }

  .member-card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .member-card-name {
    font-family: 'Geist', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .member-card-net {
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: -0.01em;
  }
  .member-card-net.positive { color: var(--mint-deep); background: var(--mint); }
  .member-card-net.negative { color: var(--accent); background: var(--accent-soft); }
  .member-card-net.zero { color: var(--ink-mute); background: var(--bg-soft); }

  .member-card-rows {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .member-stat {
    background: var(--bg-soft);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
  }

  .member-stat-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mute);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }

  .member-stat-value {
    font-family: 'Geist', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .settlement {
    padding: 16px 18px;
    background: var(--accent-soft);
    border-radius: var(--radius-lg);
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.55;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .settlement strong {
    color: var(--accent-deep);
    font-weight: 700;
  }

  .expense-list {
    padding: 0 20px 120px;
  }

  .expense-list-header {
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-mute);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 0 12px;
  }

  .expense-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 8px;
    gap: 12px;
    box-shadow: var(--shadow-sm);
    transition: all 0.15s var(--ease);
  }
  .expense-item:active { transform: scale(0.99); }

  .expense-info { flex: 1; min-width: 0; }

  .expense-title {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
    word-break: break-word;
  }

  .expense-meta {
    font-size: 12px;
    color: var(--ink-mute);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .expense-payer {
    display: inline-block;
    padding: 2px 8px;
    background: var(--sky);
    color: var(--sky-deep);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }

  .expense-amount {
    font-family: 'Geist', sans-serif;
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: -0.02em;
  }

  .expense-delete {
    background: none;
    border: none;
    color: var(--ink-mute);
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    margin-left: 8px;
    transition: color 0.15s;
  }
  .expense-delete:active { color: var(--accent); }

  /* ===== FAB ===== */
  .fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    right: 50%;
    transform: translateX(calc(260px - 36px));
    width: 60px;
    height: 60px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 32px;
    font-family: 'Geist', sans-serif;
    font-weight: 300;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255, 90, 61, 0.4), 0 2px 4px rgba(255, 90, 61, 0.2);
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s var(--ease);
  }
  .fab:active {
    transform: translateX(calc(260px - 36px)) scale(0.9);
    box-shadow: 0 4px 12px rgba(255, 90, 61, 0.4);
  }

  @media (max-width: 520px) {
    .fab {
      right: 20px;
      transform: none;
    }
    .fab:active { transform: scale(0.9); }
  }

  /* ===== MODAL ===== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 15, 15, 0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    animation: backdropIn 0.2s var(--ease);
  }
  .modal-backdrop.active { display: flex; }

  @keyframes backdropIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--bg);
    width: 100%;
    max-width: 520px;
    max-height: 88dvh;
    border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s var(--ease);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal::before {
    content: '';
    display: block;
    width: 40px;
    height: 4px;
    background: var(--line-strong);
    border-radius: 999px;
    margin: 10px auto 0;
  }

  .modal-header {
    padding: 14px 22px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 24px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .modal-close {
    background: var(--bg-soft);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    color: var(--ink-soft);
    cursor: pointer;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:active { transform: scale(0.9); }

  .modal-body {
    padding: 4px 22px 20px;
    overflow-y: auto;
    flex: 1;
  }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 14px 16px;
    font-size: 15px;
    font-family: 'Geist', sans-serif;
    font-weight: 500;
    background: var(--surface);
    border: 1.5px solid var(--line-strong);
    border-radius: var(--radius);
    color: var(--ink);
    outline: none;
    transition: all 0.15s var(--ease);
    letter-spacing: -0.01em;
  }
  .form-input:focus, .form-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .search-results {
    max-height: 280px;
    overflow-y: auto;
    border: 1px solid var(--line);
    margin-top: 8px;
    background: var(--surface);
    border-radius: var(--radius);
  }

  .search-result {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s;
  }
  .search-result:hover, .search-result:active { background: var(--bg-soft); }
  .search-result:last-child { border-bottom: none; }
  .search-result-name {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .search-result-addr { font-size: 12px; color: var(--ink-mute); margin-top: 3px; }

  .modal-footer {
    padding: 16px 22px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    background: var(--bg);
    border-top: 1px solid var(--line);
  }

  .btn {
    flex: 1;
    padding: 15px;
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.15s var(--ease);
    letter-spacing: -0.01em;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--ink);
    color: white;
    box-shadow: var(--shadow);
  }
  .btn-secondary {
    background: var(--bg-soft);
    color: var(--ink-soft);
  }

  .payer-toggle {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 8px;
  }

  .payer-opt {
    padding: 12px;
    text-align: center;
    border: 1.5px solid var(--line-strong);
    background: var(--surface);
    font-size: 14px;
    font-family: 'Geist', sans-serif;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.15s var(--ease);
    letter-spacing: -0.01em;
  }
  .payer-opt:active { transform: scale(0.96); }
  .payer-opt.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }

  .split-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .split-card {
    padding: 18px 14px;
    text-align: center;
    border: 1.5px solid var(--line-strong);
    background: var(--surface);
    cursor: pointer;
    border-radius: var(--radius-lg);
    transition: all 0.2s var(--ease);
  }
  .split-card:active { transform: scale(0.97); }

  .split-card[data-split="equal"].active {
    background: var(--sky);
    border-color: var(--sky-deep);
    color: var(--sky-deep);
  }
  .split-card[data-split="payer"].active {
    background: var(--pink);
    border-color: var(--pink-deep);
    color: var(--pink-deep);
  }

  .split-card-icon {
    font-size: 28px;
    line-height: 1;
    margin-bottom: 8px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
  }

  .split-card-title {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
    letter-spacing: -0.02em;
  }

  .split-card-desc {
    font-size: 11px;
    font-weight: 500;
    opacity: 0.7;
  }

  .linked-place-info {
    margin-bottom: 18px;
    padding: 12px 14px;
    background: var(--mint);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--mint-deep);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .linked-place-name {
    font-family: 'Geist', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    margin-top: 4px;
    letter-spacing: -0.02em;
  }

  .toast {
    position: fixed;
    top: calc(20px + env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--ink);
    color: white;
    padding: 12px 20px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border-radius: 999px;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s var(--ease);
    pointer-events: none;
    white-space: nowrap;
    box-shadow: var(--shadow-lg);
    letter-spacing: -0.01em;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .loading-spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--line-strong);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sync-indicator {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--ink-mute);
    font-family: 'Geist Mono', monospace;
    font-weight: 500;
  }

  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--mint-deep);
  }
  .sync-dot.syncing { background: var(--lemon-deep); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

</style>
</head>
<body>

<div id="app" style="display:none;">
  <header>
    <div class="header-top">
      <button class="back-to-list-btn" onclick="backToList()">
        <span>←</span> 목록
      </button>
      <span class="sync-indicator">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncText">synced</span>
      </span>
    </div>
    <div class="trip-title serif" id="tripTitle">Trip</div>
    <div class="trip-meta">
      <span id="tripDates">—</span>
      <span class="dot"></span>
      <span id="tripMembers">—</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-panel="itinerary">일정 <span class="tab-count" id="placesCount">0</span></button>
    <button class="tab" data-panel="map">지도</button>
    <button class="tab" data-panel="expenses">정산 <span class="tab-count" id="expensesCount">0</span></button>
  </nav>

  <main>
    <!-- ITINERARY -->
    <div class="panel active" data-panel="itinerary">
      <div class="day-selector" id="daySelector"></div>
      <div class="timeline" id="timeline"></div>
    </div>

    <!-- MAP -->
    <div class="panel" data-panel="map">
      <div class="map-container">
        <div class="map-legend">
          <span id="mapLegendText">선택한 날의 동선</span>
          <span class="mono" id="mapDistance">—</span>
        </div>
        <div id="map"></div>
      </div>
    </div>

    <!-- EXPENSES -->
    <div class="panel" data-panel="expenses">
      <div class="expense-summary">
        <div class="total-card">
          <div class="total-label">Total Spent</div>
          <div class="total-amount" id="totalAmount">₩0</div>
        </div>
        <div id="memberDetails"></div>
        <div class="settlement" id="settlement">아직 지출이 없어요.</div>
      </div>
      <div class="expense-list" id="expenseList"></div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   STATE & STORAGE
   ========================================================= */
const state = {
  coupleId: null,
  userName: null,
  anniversary: null,
  tripId: null,
  trip: null,
  selectedDay: null,
  map: null,
  markers: [],
  polyline: null,
  searchTimeout: null,
  currentPayer: null,
  lastSyncData: null,
};

const DEVICE_KEY = 'voyage_device';
function getDeviceId() {
  let d = localStorage.getItem(DEVICE_KEY);
  if (!d) {
    d = 'd_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem(DEVICE_KEY, d);
  }
  return d;
}

function saveLocal() {
  localStorage.setItem('hkv_session', JSON.stringify({
    coupleId: state.coupleId,
    userName: state.userName,
    anniversary: state.anniversary,
    tripId: state.tripId,
  }));
}

function loadLocal() {
  try {
    return JSON.parse(localStorage.getItem('hkv_session') || 'null');
  } catch { return null; }
}

function clearLocal() {
  localStorage.removeItem('hkv_session');
}

function clearTripFromSession() {
  // 세션은 유지하되, 현재 열려있는 trip만 비움
  const session = loadLocal();
  if (session) {
    delete session.tripId;
    localStorage.setItem('hkv_session', JSON.stringify(session));
  }
}

function fullLogout() {
  // 완전 로그아웃 (다른 커플로 전환할 때만 사용)
  localStorage.removeItem('hkv_session');
}

/* =========================================================
   COUPLE AUTH — 사귄 날짜로 인증
   ========================================================= */
function makeCoupleId(anniversary) {
  // anniversary 예: "2024-03-15" → "couple_20240315"
  return 'couple_' + anniversary.replace(/-/g, '');
}

async function loginCouple() {
  const name = document.getElementById('myName').value.trim();
  const anniv = document.getElementById('anniversary').value;
  if (!name) { toast('이름을 입력해주세요'); return; }
  if (!anniv) { toast('사귄 날짜를 입력해주세요'); return; }

  state.userName = name;
  state.anniversary = anniv;
  state.coupleId = makeCoupleId(anniv);

  // 커플 문서 확인 (없으면 생성)
  try {
    const ref = window.fbDoc(window.fbDb, 'couples', state.coupleId);
    const snap = await window.fbGetDoc(ref);
    if (!snap.exists()) {
      // 새 커플 — 첫 멤버로 생성
      await window.fbSetDoc(ref, {
        anniversary: anniv,
        members: [name],
        createdAt: Date.now(),
      });
    } else {
      // 기존 커플 — 멤버 추가 (같은 이름이면 중복 안 됨)
      const couple = snap.data();
      if (!couple.members.includes(name)) {
        couple.members.push(name);
        await window.fbSetDoc(ref, couple);
      }
    }
  } catch (e) {
    console.error('Login failed:', e);
    toast('로그인 실패: ' + e.message);
    return;
  }

  saveLocal();
  await goToTripList();
}

async function getCoupleMembers() {
  try {
    const ref = window.fbDoc(window.fbDb, 'couples', state.coupleId);
    const snap = await window.fbGetDoc(ref);
    return snap.exists() ? (snap.data().members || []) : [];
  } catch { return []; }
}

/* =========================================================
   FIRESTORE — TRIP CRUD
   couples/{coupleId}/trips/{tripId}
   ========================================================= */
let unsubscribeSnapshot = null;
let unsubscribeList = null;

async function loadTrip(tripId) {
  try {
    const ref = window.fbDoc(window.fbDb, 'couples', state.coupleId, 'trips', tripId);
    const snap = await window.fbGetDoc(ref);
    return snap.exists() ? snap.data() : null;
  } catch (e) {
    console.error('loadTrip failed:', e);
    return null;
  }
}

async function saveTrip(trip) {
  setSync('syncing');
  try {
    trip.updatedAt = Date.now();
    trip.updatedBy = state.userName;
    const ref = window.fbDoc(window.fbDb, 'couples', state.coupleId, 'trips', trip.id);
    await window.fbSetDoc(ref, trip);
    state.trip = trip;
    state.lastSyncData = JSON.stringify(trip);
    setSync('synced');
    return true;
  } catch (e) {
    console.error('saveTrip failed:', e);
    setSync('error');
    toast('저장 실패: ' + e.message);
    return false;
  }
}

async function deleteTripDoc(tripId) {
  try {
    const ref = window.fbDoc(window.fbDb, 'couples', state.coupleId, 'trips', tripId);
    // setDoc with merge is fine, but for delete we need deleteDoc — use updateDoc with marker
    // 대신 trip 자체에 deleted 플래그 추가하는 방식 → 나중에 구현, 지금은 setDoc으로 빈 마커
    await window.fbSetDoc(ref, { id: tripId, deleted: true, deletedAt: Date.now() });
    return true;
  } catch (e) {
    console.error('deleteTripDoc failed:', e);
    return false;
  }
}

function subscribeToTrip(tripId) {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  const ref = window.fbDoc(window.fbDb, 'couples', state.coupleId, 'trips', tripId);
  unsubscribeSnapshot = window.fbOnSnapshot(ref, (snap) => {
    if (!snap.exists()) return;
    const trip = snap.data();
    if (trip.deleted) return;
    const serialized = JSON.stringify(trip);
    if (serialized !== state.lastSyncData) {
      state.trip = trip;
      state.lastSyncData = serialized;
      render();
      setSync('synced');
    }
  }, (err) => {
    console.error('Snapshot error:', err);
    setSync('error');
  });
}

async function listAllTrips() {
  try {
    const colRef = window.fbCollection(window.fbDb, 'couples', state.coupleId, 'trips');
    const snap = await window.fbGetDocs(colRef);
    const trips = [];
    snap.forEach(doc => {
      const data = doc.data();
      if (!data.deleted) trips.push(data);
    });
    // 시작일 역순 (최신 여행이 위)
    trips.sort((a, b) => (b.start || '').localeCompare(a.start || ''));
    return trips;
  } catch (e) {
    console.error('listAllTrips failed:', e);
    return [];
  }
}

function subscribeToTripList(callback) {
  if (unsubscribeList) unsubscribeList();
  const colRef = window.fbCollection(window.fbDb, 'couples', state.coupleId, 'trips');
  unsubscribeList = window.fbOnSnapshot(colRef, (snap) => {
    const trips = [];
    snap.forEach(doc => {
      const data = doc.data();
      if (!data.deleted) trips.push(data);
    });
    trips.sort((a, b) => (b.start || '').localeCompare(a.start || ''));
    callback(trips);
  }, (err) => {
    console.error('List subscribe error:', err);
  });
}

/* =========================================================
   TRIP CREATION
   ========================================================= */
function generateTripId() {
  return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}

async function createTrip() {
  const name = document.getElementById('tripName').value.trim();
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  if (!name) { toast('여행 이름을 입력해주세요'); return; }
  if (!start || !end) { toast('날짜를 선택해주세요'); return; }
  if (start > end) { toast('종료일이 시작일보다 빨라요'); return; }

  const id = generateTripId();
  const days = [];
  let cur = new Date(start);
  const endD = new Date(end);
  while (cur <= endD) {
    days.push({ date: cur.toISOString().slice(0, 10), places: [] });
    cur.setDate(cur.getDate() + 1);
  }

  const members = await getCoupleMembers();
  const trip = {
    id, name, start, end, days,
    expenses: [],
    members,
    createdAt: Date.now(),
    createdBy: state.userName,
  };

  const ok = await saveTrip(trip);
  if (!ok) return;

  state.tripId = id;
  saveLocal();
  enterApp();
}

/* =========================================================
   APP NAVIGATION
   ========================================================= */
async function enterApp() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('tripListScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  if (unsubscribeList) { unsubscribeList(); unsubscribeList = null; }

  const trip = await loadTrip(state.tripId);
  if (trip) {
    state.trip = trip;
    state.lastSyncData = JSON.stringify(trip);
    // 멤버 동기화 — 내가 빠져있으면 추가
    if (!trip.members.includes(state.userName)) {
      trip.members.push(state.userName);
      await saveTrip(trip);
    }
    if (trip.days.length > 0) state.selectedDay = 0;
  }
  render();
  subscribeToTrip(state.tripId);
}

async function goToTripList() {
  // 현재 trip 구독 해제
  if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
  state.trip = null;
  state.tripId = null;
  state.lastSyncData = null;
  clearTripFromSession();

  document.getElementById('app').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('tripListScreen').style.display = 'block';

  await renderTripList();
}

function showTripList() {
  goToTripList();
}

function backToList() {
  goToTripList();
}

async function renderTripList() {
  document.getElementById('tripListUserName').textContent = state.userName || '';

  const content = document.getElementById('tripListContent');
  content.innerHTML = '<div class="trip-list-empty"><span class="trip-list-empty-emoji">⏳</span><div class="trip-list-empty-title">불러오는 중</div></div>';

  // 실시간 구독 시작
  subscribeToTripList((trips) => {
    renderTripCards(trips);
  });
}

function renderTripCards(trips) {
  const content = document.getElementById('tripListContent');
  content.innerHTML = '';

  if (trips.length === 0) {
    content.innerHTML = `
      <div class="trip-list-empty">
        <span class="trip-list-empty-emoji">✈️</span>
        <div class="trip-list-empty-title">아직 여행이 없어요</div>
        <div class="trip-list-empty-desc">첫 여행을 함께 계획해봐요</div>
        <div class="trip-list-empty-actions">
          <button class="setup-btn" onclick="newTripFromList()">새 여행 만들기</button>
        </div>
      </div>
    `;
    return;
  }

  // 분류
  const today = new Date().toISOString().slice(0, 10);
  const ongoing = [], upcoming = [], past = [];
  trips.forEach(t => {
    if (t.start <= today && today <= t.end) ongoing.push(t);
    else if (t.start > today) upcoming.push(t);
    else past.push(t);
  });

  const sections = [
    { label: '여행 중', items: ongoing, status: 'ongoing' },
    { label: '다가오는 여행', items: upcoming, status: 'upcoming' },
    { label: '지난 여행', items: past, status: 'past' },
  ];

  sections.forEach(section => {
    if (section.items.length === 0) return;
    const label = document.createElement('div');
    label.className = 'trip-list-section-label';
    label.textContent = section.label;
    content.appendChild(label);

    section.items.forEach(t => {
      const card = document.createElement('div');
      card.className = 'trip-list-card ' + section.status;
      const placeCount = (t.days || []).reduce((s, d) => s + ((d.places || []).length), 0);
      const expenseCount = (t.expenses || []).length;
      card.innerHTML = `
        <div class="trip-list-card-head">
          <div class="trip-list-card-name">${escapeHtml(t.name)}</div>
          <span class="trip-list-card-status ${section.status}">${section.label}</span>
        </div>
        <div class="trip-list-card-dates">${formatDateRange(t.start, t.end)}</div>
        <div class="trip-list-card-meta">
          <span>📍 ${placeCount}곳</span>
          <span>💸 ${expenseCount}건</span>
          <button class="trip-list-card-delete" onclick="event.stopPropagation(); deleteTripFromList('${t.id}', '${escapeAttr(t.name)}')">삭제</button>
        </div>
      `;
      card.onclick = () => openTripFromList(t);
      content.appendChild(card);
    });
  });
}

function formatDateRange(start, end) {
  if (!start || !end) return '';
  const s = new Date(start);
  const e = new Date(end);
  const sameYear = s.getFullYear() === e.getFullYear();
  const sameMonth = sameYear && s.getMonth() === e.getMonth();
  const yearStr = s.getFullYear();
  if (sameMonth) {
    return `${yearStr}년 ${s.getMonth()+1}월 ${s.getDate()}일 — ${e.getDate()}일`;
  } else if (sameYear) {
    return `${yearStr}년 ${s.getMonth()+1}월 ${s.getDate()}일 — ${e.getMonth()+1}월 ${e.getDate()}일`;
  } else {
    return `${yearStr}.${s.getMonth()+1}.${s.getDate()} — ${e.getFullYear()}.${e.getMonth()+1}.${e.getDate()}`;
  }
}

async function openTripFromList(meta) {
  state.tripId = meta.id;
  saveLocal();
  await enterApp();
}

async function deleteTripFromList(tripId, name) {
  if (!confirm(`"${name}" 여행을 삭제할까요?\n\n둘 다 더 이상 볼 수 없게 됩니다. 이 작업은 취소할 수 없어요.`)) return;
  await deleteTripDoc(tripId);
  toast('삭제됨');
}

function newTripFromList() {
  document.getElementById('tripListScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('setupStep1').style.display = 'none';
  document.getElementById('setupStep2').style.display = 'block';
  document.getElementById('setupBackBtn').style.display = 'flex';
  document.getElementById('tripName').value = '';
  document.getElementById('startDate').value = '';
  document.getElementById('endDate').value = '';
}

function logoutCouple() {
  if (!confirm('로그아웃할까요?\n다음에 다시 같은 이름과 사귄 날짜로 들어오면 데이터를 그대로 볼 수 있어요.')) return;
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  if (unsubscribeList) unsubscribeList();
  fullLogout();
  state.coupleId = null;
  state.userName = null;
  state.anniversary = null;
  state.trip = null;
  state.tripId = null;
  state.lastSyncData = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('tripListScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('setupStep1').style.display = 'block';
  document.getElementById('setupStep2').style.display = 'none';
  document.getElementById('setupBackBtn').style.display = 'none';
  document.getElementById('myName').value = '';
  document.getElementById('anniversary').value = '';
}

/* =========================================================
   RENDER
   ========================================================= */
function render() {
  if (!state.trip) return;
  const t = state.trip;

  document.getElementById('tripTitle').textContent = t.name;
  document.getElementById('tripDates').textContent =
    formatDate(t.start) + ' — ' + formatDate(t.end);
  const memberStr = (t.members || []).join(' & ') || state.userName;
  document.getElementById('tripMembers').textContent = memberStr;

  const totalPlaces = t.days.reduce((s, d) => s + d.places.length, 0);
  document.getElementById('placesCount').textContent = totalPlaces;
  document.getElementById('expensesCount').textContent = t.expenses.length;

  renderDays();
  renderTimeline();
  renderExpenses();
  if (document.querySelector('.tab.active').dataset.panel === 'map') {
    renderMap();
  }
}

function formatDate(s) {
  const d = new Date(s);
  return (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
}

function renderDays() {
  const sel = document.getElementById('daySelector');
  sel.innerHTML = '';
  state.trip.days.forEach((d, i) => {

function formatShort(s) {
  const d = new Date(s);
  const days = ['일','월','화','수','목','금','토'];
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' + days[d.getDay()];
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return String(s).replace(/'/g, "\\'"); }

/* =========================================================
   MAP
   ========================================================= */
function initMap() {
  if (state.map) return;
  state.map = L.map('map', { zoomControl: true, attributionControl: true })
    .setView([37.5665, 126.9780], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(state.map);
}

function renderMap() {
  initMap();
  state.markers.forEach(m => state.map.removeLayer(m));
  state.markers = [];
  if (state.polyline) { state.map.removeLayer(state.polyline); state.polyline = null; }

  if (state.selectedDay === null || !state.trip.days[state.selectedDay]) return;
  const day = state.trip.days[state.selectedDay];
  const sorted = [...day.places].sort((a,b) => (a.time||'').localeCompare(b.time||''));

  document.getElementById('mapLegendText').textContent =
    `Day ${state.selectedDay + 1} · ${sorted.length}곳`;

  if (sorted.length === 0) {
    document.getElementById('mapDistance').textContent = '—';
    return;
  }

  const coords = [];
  sorted.forEach((p, i) => {
    const icon = L.divIcon({
      className: 'custom-marker',
      html: `<div style="width:32px;height:32px;background:#b8402c;color:#fdf8ee;border:2px solid #fdf8ee;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Fraunces,serif;font-weight:600;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.3);">${i+1}</div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 16],
    });
    const m = L.marker([p.lat, p.lng], { icon }).addTo(state.map);
    m.bindPopup(`<strong>${escapeHtml(p.name)}</strong>${p.time?'<br/>'+p.time:''}`);
    state.markers.push(m);
    coords.push([p.lat, p.lng]);
  });

  if (coords.length > 1) {
    state.polyline = L.polyline(coords, { color: '#b8402c', weight: 3, opacity: 0.7, dashArray: '6,6' }).addTo(state.map);
    let dist = 0;
    for (let i = 1; i < coords.length; i++) {
      dist += haversine(coords[i-1], coords[i]);
    }
    document.getElementById('mapDistance').textContent =
      dist < 1 ? (dist*1000).toFixed(0) + 'm' : dist.toFixed(1) + 'km';
  } else {
    document.getElementById('mapDistance').textContent = '1곳';
  }

  if (coords.length === 1) {
    state.map.setView(coords[0], 14);
  } else {
    state.map.fitBounds(coords, { padding: [40, 40] });
  }
  setTimeout(() => state.map.invalidateSize(), 100);
}

function haversine(a, b) {
  const R = 6371;
  const dLat = (b[0]-a[0]) * Math.PI/180;
  const dLng = (b[1]-a[1]) * Math.PI/180;
  const x = Math.sin(dLat/2)**2 + Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

/* =========================================================
   EXPENSES
   ========================================================= */
function renderExpenses() {
  const t = state.trip;
  const total = t.expenses.reduce((s,e) => s + e.amount, 0);
  document.getElementById('totalAmount').textContent = '₩' + total.toLocaleString();

  const members = t.members.length > 0 ? t.members : [state.userName];
  const paid = {};
  const owed = {};
  members.forEach(m => { paid[m] = 0; owed[m] = 0; });

  t.expenses.forEach(e => {
    paid[e.payer] = (paid[e.payer] || 0) + e.amount;
    if (e.splitMode === 'equal') {
      members.forEach(m => { owed[m] = (owed[m] || 0) + e.amount / members.length; });
    } else {
      owed[e.payer] = (owed[e.payer] || 0) + e.amount;
    }
  });

  const detailsEl = document.getElementById('memberDetails');
  detailsEl.innerHTML = '';
  members.forEach(m => {
    const p = paid[m] || 0;
    const o = owed[m] || 0;
    const net = p - o;
    const netClass = net > 0.5 ? 'positive' : net < -0.5 ? 'negative' : 'zero';
    const netLabel = net > 0.5 ? `+₩${Math.round(net).toLocaleString()} 받을 돈`
                   : net < -0.5 ? `-₩${Math.round(-net).toLocaleString()} 줄 돈`
                   : '±0';
    const card = document.createElement('div');
    card.className = 'member-card';
    card.innerHTML = `
      <div class="member-card-head">
        <span class="member-card-name">${escapeHtml(m)}</span>
        <span class="member-card-net ${netClass}">${netLabel}</span>
      </div>
      <div class="member-card-rows">
        <div class="member-stat">
          <div class="member-stat-label">결제한 금액</div>
          <div class="member-stat-value">₩${Math.round(p).toLocaleString()}</div>
        </div>
        <div class="member-stat">
          <div class="member-stat-label">부담해야 할 몫</div>
          <div class="member-stat-value">₩${Math.round(o).toLocaleString()}</div>
        </div>
      </div>
    `;
    detailsEl.appendChild(card);
  });

  // settlement
  const settleEl = document.getElementById('settlement');
  if (t.expenses.length === 0) {
    settleEl.textContent = '아직 지출이 없어요.';
  } else if (members.length < 2) {
    settleEl.innerHTML = `상대방이 참여하면 정산 내역이 보여요. <strong>코드 ${t.code}</strong>를 공유하세요.`;
  } else {
    // compute net: net[m] = paid[m] - owed[m] (positive = should receive)
    const net = {};
    members.forEach(m => { net[m] = (paid[m]||0) - (owed[m]||0); });
    const creditor = members.reduce((a,b) => net[a]>net[b]?a:b);
    const debtor = members.reduce((a,b) => net[a]<net[b]?a:b);
    const amt = Math.round(net[creditor]);
    if (amt < 1) {
      settleEl.innerHTML = '정산 완료 · 서로 공평해요 ✨';
    } else {
      settleEl.innerHTML = `<strong>${escapeHtml(debtor)}</strong>님이 <strong>${escapeHtml(creditor)}</strong>님에게<br/><strong>₩${amt.toLocaleString()}</strong> 정산하면 돼요.`;
    }
  }

  // list
  const list = document.getElementById('expenseList');
  list.innerHTML = '';
  if (t.expenses.length === 0) {
    list.innerHTML = '<div class="empty-state"><span class="empty-state-emoji">💸</span><div class="serif-big">지출 기록이 없어요</div><div>＋ 버튼으로 추가해보세요</div></div>';
    return;
  }

  const header = document.createElement('div');
  header.className = 'expense-list-header';
  header.textContent = `지출 내역 · ${t.expenses.length}건`;
  list.appendChild(header);

  // 장소별 그룹 매핑
  const placeMap = {};
  state.trip.days.forEach(d => d.places.forEach(p => { placeMap[p.id] = p.name; }));

  [...t.expenses].reverse().forEach(e => {
    const placeName = e.placeId && placeMap[e.placeId] ? placeMap[e.placeId] : null;
    const item = document.createElement('div');
    item.className = 'expense-item';
    item.innerHTML = `
      <div class="expense-info">
        <div class="expense-title">${escapeHtml(e.title)}</div>
        <div class="expense-meta">
          <span class="expense-payer">${escapeHtml(e.payer)}</span>
          <span>${e.splitMode === 'equal' ? '더치' : '전액부담'}</span>
          ${placeName ? `<span>📍 ${escapeHtml(placeName)}</span>` : ''}
          <span>${new Date(e.at).toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}</span>
        </div>
      </div>
      <div>
        <span class="expense-amount">₩${e.amount.toLocaleString()}</span>
        <button class="expense-delete" onclick="deleteExpense('${e.id}')">×</button>
      </div>
    `;
    list.appendChild(item);
  });
}

/* =========================================================
   GEOCODING (Nominatim)
   ========================================================= */
document.getElementById('placeSearch').addEventListener('input', (e) => {
  clearTimeout(state.searchTimeout);
  const q = e.target.value.trim();
  if (q.length < 2) {
    document.getElementById('searchResults').style.display = 'none';
    return;
  }
  state.searchTimeout = setTimeout(() => doSearch(q), 500);
});

async function doSearch(q) {
  const results = document.getElementById('searchResults');
  results.style.display = 'block';
  results.innerHTML = '<div class="search-result"><span class="loading-spinner"></span>검색 중...</div>';

  // 1차: Photon (Komoot) — CORS 열려있음, 한국어 지원
  let items = await searchPhoton(q);

  // 2차: Nominatim (OSM) fallback
  if (!items || items.length === 0) {
    items = await searchNominatim(q);
  }

  if (!items) {
    results.innerHTML = '<div class="search-result" style="color:var(--accent);">검색 서버 연결 실패. 잠시 후 다시 시도해주세요.</div>';
    return;
  }

  if (items.length === 0) {
    results.innerHTML = '<div class="search-result" style="color:var(--ink-mute);">결과가 없어요. 더 구체적으로 검색해보세요.<br/><span style="font-size:10px;">예: "스타벅스 강남역" · "제주 성산일출봉"</span></div>';
    return;
  }

  results.innerHTML = '';
  items.forEach(d => {
    const el = document.createElement('div');
    el.className = 'search-result';
    el.innerHTML = `<div class="search-result-name">${escapeHtml(d.name)}</div><div class="search-result-addr">${escapeHtml(d.addr || '')}</div>`;
    el.onclick = () => pickPlace(d.name, d.addr || d.name, d.lat, d.lng);
    results.appendChild(el);
  });
}

async function searchPhoton(q) {
  try {
    const url = 'https://photon.komoot.io/api/?q=' + encodeURIComponent(q) + '&limit=8&lang=default';
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    if (!data.features) return [];
    return data.features.map(f => {
      const p = f.properties;
      const name = p.name || p.street || q;
      const parts = [p.street, p.district, p.city, p.state, p.country].filter(Boolean);
      const addr = parts.length > 0 ? parts.join(', ') : (p.name || '');
      return {
        name,
        addr: addr || name,
        lat: f.geometry.coordinates[1],
        lng: f.geometry.coordinates[0],
      };
    });
  } catch (e) {
    console.warn('Photon failed:', e);
    return null;
  }
}

async function searchNominatim(q) {
  try {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) + '&limit=8&accept-language=ko';
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    return data.map(d => ({
      name: d.display_name.split(',')[0],
      addr: d.display_name,
      lat: parseFloat(d.lat),
      lng: parseFloat(d.lon),
    }));
  } catch (e) {
    console.warn('Nominatim failed:', e);
    return null;
  }
}

function pickPlace(name, addr, lat, lng) {
  document.getElementById('placeName').value = name;
  document.getElementById('placeAddr').value = addr;
  document.getElementById('placeLat').value = lat;
  document.getElementById('placeLng').value = lng;
  document.getElementById('placeSearch').value = name;
  document.getElementById('searchResults').style.display = 'none';
}

   CRUD
   ========================================================= */
async function savePlace() {
  const lat = document.getElementById('placeLat').value;
  const lng = document.getElementById('placeLng').value;
  if (!lat) { toast('장소를 선택해주세요'); return; }
  const place = {
    id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    name: document.getElementById('placeName').value,
    address: document.getElementById('placeAddr').value,
    lat: parseFloat(lat),
    lng: parseFloat(lng),
    time: document.getElementById('placeTime').value,
    note: document.getElementById('placeNote').value.trim(),
  };
  state.trip.days[state.selectedDay].places.push(place);
  await saveTrip(state.trip);
  closeModal('placeModal');
  render();
  toast('추가됨');
}

async function deletePlace(id) {
  const linkedCount = state.trip.expenses.filter(e => e.placeId === id).length;
  const msg = linkedCount > 0
    ? `이 장소를 지울까요?\n연결된 지출 ${linkedCount}건도 함께 삭제됩니다.`
    : '이 장소를 지울까요?';
  if (!confirm(msg)) return;
  state.trip.days[state.selectedDay].places =
    state.trip.days[state.selectedDay].places.filter(p => p.id !== id);
  // 연결된 지출도 제거
  state.trip.expenses = state.trip.expenses.filter(e => e.placeId !== id);
  await saveTrip(state.trip);
  render();
}

async function saveDay() {
  const date = document.getElementById('newDayDate').value;
  if (!date) { toast('날짜를 선택하세요'); return; }
  if (state.trip.days.some(d => d.date === date)) { toast('이미 있는 날짜예요'); return; }
  state.trip.days.push({ date, places: [] });
  state.trip.days.sort((a,b) => a.date.localeCompare(b.date));
  state.trip.start = state.trip.days[0].date;
  state.trip.end = state.trip.days[state.trip.days.length-1].date;
  await saveTrip(state.trip);
  closeModal('dayModal');
  render();
}

async function saveExpense() {
  const title = document.getElementById('expenseTitle').value.trim();
  const amount = parseInt(document.getElementById('expenseAmount').value);
  if (!title) { toast('항목을 입력하세요'); return; }
  if (!amount || amount < 1) { toast('금액을 입력하세요'); return; }
  const placeId = document.getElementById('linkedPlaceId').value || null;
  const expense = {
    id: 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    title, amount,
    payer: state.currentPayer,
    splitMode: document.getElementById('splitMode').value,
    placeId,
    at: Date.now(),
  };
  state.trip.expenses.push(expense);
  await saveTrip(state.trip);
  closeModal('expenseModal');
  render();
  toast('추가됨');
}

async function deleteExpense(id) {
  if (!confirm('이 지출을 지울까요?')) return;
  state.trip.expenses = state.trip.expenses.filter(e => e.id !== id);
  await saveTrip(state.trip);
  render();
}

function openInMaps(lat, lng, name) {

/* =========================================================
   BOOT
   ========================================================= */
function waitForFirebase() {
  return new Promise((resolve) => {
    if (window.fbReady) return resolve();
    window.addEventListener('firebase-ready', resolve, { once: true });
  });
}

(async function boot() {
  await waitForFirebase();

  const session = loadLocal();

  // 1. 세션이 있으면 (= 이미 로그인됨) 바로 진행
  if (session && session.coupleId && session.userName && session.anniversary) {
    state.coupleId = session.coupleId;
    state.userName = session.userName;
    state.anniversary = session.anniversary;

    // 1-1. 활성 trip이 있으면 바로 그 trip 진입
    if (session.tripId) {
      state.tripId = session.tripId;
      const trip = await loadTrip(session.tripId);
      if (trip) {
        state.trip = trip;
        state.lastSyncData = JSON.stringify(trip);
        if (!trip.members.includes(state.userName)) {
          trip.members.push(state.userName);
          await saveTrip(trip);
        }
        if (trip.days.length > 0) state.selectedDay = 0;
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('tripListScreen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        render();
        subscribeToTrip(state.tripId);
        return;
      } else {
        clearTripFromSession();
        state.tripId = null;
      }
    }

    // 1-2. trip 없으면 목록 화면
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('tripListScreen').style.display = 'block';
    await renderTripList();
    return;
  }

  // 2. 세션 없음 → 로그인 화면
  // Setup screen is already visible by default
})();
</script>
</body>
</html>
